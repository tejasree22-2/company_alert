<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Add Company</title>
  <link rel="stylesheet" href="../static/admin.css">
</head>
<body>

  <div class="admin-box">
    <h1>Admin Panel</h1>
    <p>Add company details. Matching subscribed users will get email.</p>

    <form id="companyForm">
      <label>Company Name</label>
      <input type="text" id="company_name" required>

      <label>Address</label>
      <input type="text" id="address" required>

      <label>City</label>
      <input type="text" id="city" required>

      <label>Category</label>
     <select id="category" required>
        <option value="IT">IT</option>
        <option value="Non-Tech">Non-Tech</option>
        <option value="Restaurants">Restaurants</option>
        <option value="Hospitals">Hospitals</option>
      </select>
      

      <label>Opening Date</label>
     <input type="date" id="opening_date">

      <button type="submit">Add Company & Notify</button>
    </form>

    <div id="msg"></div>

    <a href="/" class="back">⬅ Back to Home</a>
  </div>

  <script src="../static/admin.js"></script>
</body>
</html>
