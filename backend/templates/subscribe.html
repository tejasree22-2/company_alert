<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscribe - Company Alerts</title>
  <link rel="stylesheet" href="../static/subscribe.css">
</head>
<body>

  <header class="topbar">
    <h2>Company Alerts</h2>
    <div class="nav">
      <button id="homeBtn">Home</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="container">

    <!-- SUBSCRIBE FORM -->
    <section class="card">
      <h1>Subscribe to Updates</h1>
      <p>Select city + category. You will get an email when a matching company is added.</p>

      <label>City</label>
      <input type="text" id="city" placeholder="Eg: Hyderabad" required>

      <label>Category</label>
      <select id="category">
        <option value="IT">IT</option>
        <option value="Non-Tech">Non-Tech</option>
        <option value="Restaurants">Restaurants</option>
        <option value="Hospitals">Hospitals</option>
      </select>

      <button id="subscribeBtn">Confirm Subscription</button>

      <div id="subMsg"></div>
    </section>

    <!-- MY SUBSCRIPTIONS -->
    <section class="card">
      <h1>My Subscriptions</h1>
      <div id="subscriptionsList"></div>
    </section>

  </main>

  <script src="../static/subscribe.js"></script>
</body>
</html>
